name: Clear Downloads Folder

on:
  workflow_dispatch:

jobs:
  delete:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Warning and delete
        run: |
          echo "⚠️ WARNING: This will delete ALL files inside downloads/ folder."
          echo "If you want to delete all files, you have already clicked 'Run workflow'."
          echo "Proceeding with deletion..."
          rm -rf downloads/*
          echo "✅ All files deleted from downloads/."
